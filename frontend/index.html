<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/src/assets/favicon.svg" />
    <script>
      const savedTheme = localStorage.getItem('libro-theme')
      const theme = savedTheme === 'dark' ? 'dark' : 'light'
      document.documentElement.dataset.theme = theme
    </script>
    <title>Libro — Reading Intelligence Workspace</title>
    <meta
      name="description"
      content="Libro helps you organize, finish, and understand your reading with focused workflows, analytics, and reminders."
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
