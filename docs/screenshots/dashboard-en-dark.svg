<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="980" viewBox="0 0 1600 980" role="img" aria-labelledby="title desc">
  <title id="title">Libro dashboard in English (dark mode)</title>
  <desc id="desc">Dashboard preview with stats cards, insights, analytics, and goals in dark mode.</desc>
  <rect width="1600" height="980" fill="#0f172a"/>
  <rect x="0" y="0" width="1600" height="78" fill="#020617" stroke="#334155"/>
  <text x="36" y="49" font-family="Inter, Arial, sans-serif" font-size="28" fill="#e2e8f0" font-weight="700">Libro Dashboard</text>
  <text x="1420" y="49" font-family="Inter, Arial, sans-serif" font-size="18" fill="#94a3b8">Dark mode</text>

  <g font-family="Inter, Arial, sans-serif">
    <rect x="36" y="112" width="365" height="142" rx="14" fill="#1e293b" stroke="#334155"/>
    <text x="60" y="152" font-size="18" fill="#94a3b8">Currently Reading</text>
    <text x="60" y="210" font-size="42" fill="#e2e8f0" font-weight="700">1</text>

    <rect x="422" y="112" width="365" height="142" rx="14" fill="#1e293b" stroke="#334155"/>
    <text x="446" y="152" font-size="18" fill="#94a3b8">In Library</text>
    <text x="446" y="210" font-size="42" fill="#e2e8f0" font-weight="700">5</text>

    <rect x="808" y="112" width="365" height="142" rx="14" fill="#1e293b" stroke="#334155"/>
    <text x="832" y="152" font-size="18" fill="#94a3b8">Finished</text>
    <text x="832" y="210" font-size="42" fill="#e2e8f0" font-weight="700">12</text>

    <rect x="1194" y="112" width="370" height="142" rx="14" fill="#1e293b" stroke="#334155"/>
    <text x="1218" y="152" font-size="18" fill="#94a3b8">Reading Pace</text>
    <text x="1218" y="210" font-size="42" fill="#e2e8f0" font-weight="700">240</text>

    <rect x="36" y="286" width="980" height="648" rx="16" fill="#1e293b" stroke="#334155"/>
    <text x="66" y="334" font-size="28" fill="#e2e8f0" font-weight="700">Current Snapshot</text>

    <rect x="1040" y="286" width="524" height="308" rx="16" fill="#1e293b" stroke="#334155"/>
    <text x="1070" y="334" font-size="28" fill="#e2e8f0" font-weight="700">Reading Insights</text>

    <rect x="1040" y="626" width="524" height="308" rx="16" fill="#1e293b" stroke="#334155"/>
    <text x="1070" y="674" font-size="28" fill="#e2e8f0" font-weight="700">Goals</text>
  </g>
</svg>
